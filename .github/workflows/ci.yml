name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install pydantic pydantic-settings pytest ruff mypy

      # make check = ruff (lint) + mypy (typecheck) + pytest (test), run per package.
      # The Makefile's PY defaults to ../../.venv/bin/python, which resolves to this root venv.
      - name: make check
        run: make check
